[[modes]]
name = "gitops"
init_command = "devbox shell"
reactive_panes = 2

# Persistent pane: Monitor uncommitted file status
[[modes.panes]]
command = "git status --short"
name = "Git Status"

# Reactive rule: Capture Argo CD application status commands
[[modes.rules]]
pattern = "kubectl\\s+get\\s+applications"
watch = false

# Reactive rule: Capture kubectl get commands
[[modes.rules]]
pattern = "kubectl\\s+get"
watch = false

# Reactive rule: Capture kubectl describe commands
[[modes.rules]]
pattern = "kubectl\\s+describe"
watch = false

# Reactive rule: Capture kubectl logs commands
[[modes.rules]]
pattern = "kubectl\\s+logs"
watch = false

# Reactive rule: Capture kubectl rollout status commands
[[modes.rules]]
pattern = "kubectl\\s+rollout\\s+status"
watch = false

# Reactive rule: Capture helm list commands
[[modes.rules]]
pattern = "helm\\s+list"
watch = false
