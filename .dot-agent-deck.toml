[[modes]]
name = "gitops-ops"

[[modes.panes]]
command = "kubectl get apps -n argocd -w"
name = "Argo CD Apps"

[[modes.rules]]
pattern = "kubectl\\s+(describe|explain)"
watch = false

[[modes.rules]]
pattern = "kubectl\\s+(get|top)"
watch = true
interval = 5

[[modes.rules]]
pattern = "kubectl\\s+logs"
watch = true
interval = 10

[[modes.rules]]
pattern = "nu\\s+dot\\.nu"
watch = false
