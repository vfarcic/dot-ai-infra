apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: youtube-automation
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/vfarcic/youtube-automation.git
    targetRevision: HEAD
    path: helm/youtube-automation
    helm:
      valuesObject:
        existingSecret: youtube-automation-secrets
        existingSecretKey: api-token
        env:
          GIT_REPO_URL: https://github.com/vfarcic/devops-catalog
          GIT_BRANCH: master
          GIT_AUTHOR_NAME: vfarcic
          GIT_AUTHOR_EMAIL: viktor@farcic.com
          GIT_COMMITTER_NAME: vfarcic
          GIT_COMMITTER_EMAIL: viktor@farcic.com
          ANTHROPIC_MODEL: claude-sonnet-4-5-20250929
          EMAIL_FROM: viktor@farcic.com
          EMAIL_THUMBNAIL_TO: pavle.farcic@gmail.com
          EMAIL_EDIT_TO: devopstoolkit@farcic.com
          EMAIL_FINANCE_TO: devopstoolkit@farcic.com
          HUGO_REPO_URL: https://github.com/vfarcic/devopstoolkit-live
          HUGO_BRANCH: main
          GDRIVE_CREDENTIALS_FILE: /client_secret.json
          GDRIVE_TOKEN_FILE: gdrive-go.json
          GDRIVE_FOLDER_ID: "0AK6Oeg1IJ0QEUk9PVA"
          YOUTUBE_CHANNEL_ID: UCfz8x0lVzJpb_dgWm9kPVrw
        volumeMounts:
          - name: oauth-credentials
            mountPath: /client_secret.json
            subPath: client_secret.json
            readOnly: true
          - name: oauth-tokens
            mountPath: /root/.credentials
        volumes:
          - name: oauth-credentials
            secret:
              secretName: youtube-automation-oauth-client
          - name: oauth-tokens
            secret:
              secretName: youtube-automation-oauth-tokens
        envFrom:
          - secretRef:
              name: youtube-automation-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: youtube-automation
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: youtube-automation-secrets
  namespace: youtube-automation
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: youtube-automation-secrets
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: dot-ai-auth-token
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: anthropic-api-key
    - secretKey: YOUTUBE_API_KEY
      remoteRef:
        key: youtube-api-key
    - secretKey: YOUTUBE_TOKEN
      remoteRef:
        key: youtube-token
    - secretKey: EMAIL_PASSWORD
      remoteRef:
        key: app-email-password
    - secretKey: BLUESKY_IDENTIFIER
      remoteRef:
        key: bluesky-identifier
    - secretKey: BLUESKY_PASSWORD
      remoteRef:
        key: bluesky-password
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: github-token
    - secretKey: GOOGLE_GENERATIVE_AI_API_KEY
      remoteRef:
        key: google-gemini-api-key
    - secretKey: GIT_TOKEN
      remoteRef:
        key: github-token
    - secretKey: SLACK_API_TOKEN
      remoteRef:
        key: slack-api-token
---
apiVersion: gcp.m.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
  namespace: youtube-automation
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  projectID: vfarcic
  credentials:
    source: InjectedIdentity
---
apiVersion: certificatemanager.gcp.m.upbound.io/v1beta1
kind: Certificate
metadata:
  name: youtube-certificate
  namespace: youtube-automation
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  forProvider:
    location: global
    managed:
      domains:
        - youtube.devopstoolkit.ai
  providerConfigRef:
    kind: ProviderConfig
    name: default
---
apiVersion: certificatemanager.gcp.m.upbound.io/v1beta1
kind: CertificateMapEntry
metadata:
  name: youtube-map-entry
  namespace: youtube-automation
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  forProvider:
    certificatesRefs:
      - name: youtube-certificate
    hostname: youtube.devopstoolkit.ai
    map: devopstoolkit-map
  providerConfigRef:
    kind: ProviderConfig
    name: default
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: youtube-automation
  namespace: youtube-automation
spec:
  default:
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /health
  targetRef:
    group: ""
    kind: Service
    name: youtube-automation
---
apiVersion: networking.gke.io/v1
kind: GCPBackendPolicy
metadata:
  name: youtube-automation
  namespace: youtube-automation
spec:
  default:
    timeoutSec: 3600
  targetRef:
    group: ""
    kind: Service
    name: youtube-automation
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: youtube-automation
  namespace: youtube-automation
spec:
  parentRefs:
    - name: main
      namespace: gateway
      sectionName: https
    - name: main
      namespace: gateway
      sectionName: http
  hostnames:
    - youtube.devopstoolkit.ai
  rules:
    - backendRefs:
        - name: youtube-automation
          port: 80
