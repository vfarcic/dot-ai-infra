apiVersion: gcp.m.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
  namespace: dot-ai
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  projectID: vfarcic
  credentials:
    source: InjectedIdentity
---
apiVersion: certificatemanager.gcp.m.upbound.io/v1beta1
kind: Certificate
metadata:
  name: dex-certificate
  namespace: dot-ai
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  forProvider:
    location: global
    managed:
      domains:
        - dex.dot-ai.devopstoolkit.ai
  providerConfigRef:
    kind: ProviderConfig
    name: default
---
apiVersion: certificatemanager.gcp.m.upbound.io/v1beta1
kind: CertificateMapEntry
metadata:
  name: dex-map-entry
  namespace: dot-ai
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  forProvider:
    certificatesRefs:
      - name: dex-certificate
    hostname: dex.dot-ai.devopstoolkit.ai
    map: devopstoolkit-map
  providerConfigRef:
    kind: ProviderConfig
    name: default
