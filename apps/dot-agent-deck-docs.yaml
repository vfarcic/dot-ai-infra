apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dot-agent-deck-docs
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/vfarcic/dot-agent-deck.git
    targetRevision: HEAD
    path: site/helm
    helm:
      valuesObject:
        ingress:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: dot-ai
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dot-agent-deck-docs
  namespace: dot-ai
spec:
  parentRefs:
    - name: main
      namespace: gateway
      sectionName: https
  hostnames:
    - agent-deck.devopstoolkit.ai
  rules:
    - backendRefs:
        - name: dot-agent-deck-docs
          port: 8080
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: dot-agent-deck-docs
  namespace: dot-ai
spec:
  default:
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /
  targetRef:
    group: ""
    kind: Service
    name: dot-agent-deck-docs
---
apiVersion: certificatemanager.gcp.m.upbound.io/v1beta1
kind: Certificate
metadata:
  name: agent-deck-certificate
  namespace: dot-ai
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  forProvider:
    location: global
    managed:
      domains:
        - agent-deck.devopstoolkit.ai
  providerConfigRef:
    kind: ProviderConfig
    name: default
---
apiVersion: certificatemanager.gcp.m.upbound.io/v1beta1
kind: CertificateMapEntry
metadata:
  name: agent-deck-map-entry
  namespace: dot-ai
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  forProvider:
    certificatesRefs:
      - name: agent-deck-certificate
    hostname: agent-deck.devopstoolkit.ai
    map: devopstoolkit-map
  providerConfigRef:
    kind: ProviderConfig
    name: default
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: dot-agent-deck-docs-vpa
  namespace: dot-ai
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dot-agent-deck-docs
  updatePolicy:
    updateMode: "Off"
