apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dot-ai-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: ghcr.io/vfarcic/dot-ai-stack/charts
    chart: dot-ai-stack
    targetRevision: 0.89.0
    helm:
      valuesObject:
        dot-ai:
          ai:
            provider: anthropic
          controller:
            enabled: true
          rbac:
            enforcement:
              enabled: true
          dex:
            enabled: true
            existingSecret: dot-ai-dex-auth
            adminPasswordHash: "$2y$10$FYjFSab.h4.1BCQJw4/96OaB1JR07Qy8NDwU0RCYuPZeuso93SYyu"
            envFrom:
              - secretRef:
                  name: dot-ai-dex-auth
              - secretRef:
                  name: dex-google-oauth
            connectors:
              - type: google
                id: google
                name: Google
                config:
                  clientID: $GOOGLE_CLIENT_ID
                  clientSecret: $GOOGLE_CLIENT_SECRET
                  redirectURI: "https://dex.dot-ai.devopstoolkit.ai/callback"
                  hostedDomains:
                    - farcic.com
          extraEnv:
            - name: DOT_AI_USER_PROMPTS_REPO
              value: "https://github.com/vfarcic/prompts"
            - name: DOT_AI_USER_PROMPTS_PATH
              value: "."
            - name: OTEL_TRACING_ENABLED
              value: "true"
            - name: OTEL_EXPORTER_TYPE
              value: "otlp"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.alloy:4318/v1/traces"
          webUI:
            baseUrl: https://ui.devopstoolkit.ai
          gateway:
            name: main
            namespace: gateway
            listeners:
              http:
                hostname: dot-ai.devopstoolkit.ai
              https:
                enabled: true
                hostname: dot-ai.devopstoolkit.ai
            timeouts:
              request: ""
              backendRequest: ""
        dot-ai-ui:
          dotAi:
            url: https://dot-ai.devopstoolkit.ai
          uiAuth:
            secretRef:
              name: "dot-ai-secrets"
              key: "auth-token"
          gateway:
            name: main
            namespace: gateway
            listeners:
              http:
                hostname: ui.devopstoolkit.ai
              https:
                enabled: true
                hostname: ui.devopstoolkit.ai
            timeouts:
              request: ""
              backendRequest: ""
  destination:
    server: https://kubernetes.default.svc
    namespace: dot-ai
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: dot-ai-vpa
  namespace: dot-ai
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dot-ai
  updatePolicy:
    updateMode: "Off"
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: dot-ai-controller-manager-vpa
  namespace: dot-ai
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dot-ai-controller-manager
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: 50m
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
    minReplicas: 1
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: dot-ai-stack-dex-vpa
  namespace: dot-ai
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dot-ai-stack-dex
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: 50m
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
    minReplicas: 1
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: dot-ai-stack-agentic-tools-vpa
  namespace: dot-ai
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dot-ai-stack-agentic-tools
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: 50m
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
    minReplicas: 1
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: dot-ai-ui-vpa
  namespace: dot-ai
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dot-ai-ui
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: 50m
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
    minReplicas: 1
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: qdrant-vpa
  namespace: dot-ai
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: dot-ai-stack-qdrant
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: 50m
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
    minReplicas: 1
