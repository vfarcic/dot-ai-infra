apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dot-ai-website
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/vfarcic/dot-ai-website.git
    targetRevision: HEAD
    path: k8s/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: dot-ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: dot-ai-website-vpa
  namespace: dot-ai
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dot-ai-website
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
