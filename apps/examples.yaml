apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: examples
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/vfarcic/dot-ai-infra.git
    targetRevision: HEAD
    path: examples
  destination:
    server: https://kubernetes.default.svc
    namespace: examples
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
      allowEmpty: true
