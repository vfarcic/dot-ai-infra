apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: vfarcic
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dot-ai-secrets
  namespace: dot-ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: dot-ai-secrets
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: anthropic-api-key
    - secretKey: openai-api-key
      remoteRef:
        key: openai-key
    - secretKey: auth-token
      remoteRef:
        key: dot-ai-auth-token
    - secretKey: SLACK_WEBHOOK_URL
      remoteRef:
        key: slack-webhook-url
    - secretKey: github-token
      remoteRef:
        key: github-token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dex-google-oauth
  namespace: dot-ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: dex-google-oauth
    creationPolicy: Owner
  data:
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: dot-ai-oauth-client-id
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: dot-ai-oauth-client-secret
