apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.4.0
    helm:
      valuesObject:
        serviceAccount:
          create: true
          name: external-secrets
          annotations:
            iam.gke.io/gcp-service-account: external-secrets@vfarcic.iam.gserviceaccount.com
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: external-secrets-vpa
  namespace: external-secrets
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: external-secrets
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: 50m
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
    minReplicas: 1
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: external-secrets-webhook-vpa
  namespace: external-secrets
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: external-secrets-webhook
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: 50m
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
    minReplicas: 1
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: external-secrets-cert-controller-vpa
  namespace: external-secrets
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: external-secrets-cert-controller
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: 50m
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
    minReplicas: 1
